<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wittdigital // PRECISION_ENGINEERING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>wittdigital</h1>
        <a href="#home">SYSTEM_HOME</a>
        <a href="#apps">APP_DEVELOPMENT</a>
        <a href="#bots">BOT_INTEGRATION</a>
    </nav>

    <main>
    <section id="home" class="page-content active">
        <div class="header-status">LIVE_STREAM_ACTIVE // 2026_VERSION</div>
        <h2 id="typewriter-title"></h2>
        <p>在這裡，我將智慧轉化為代碼...</p>
        
        <div class="project-grid">
            <div class="card" onclick="showPage('apps')">
                <h3>工程報價系統 v1.2.3</h3>
                <p>點擊進入 APP 詳情...</p>
                <span class="btn">進入專區</span>
            </div>
        </div>
    </section>

    <section id="apps" class="page-content">
        <div class="header-status">[PATH: /APP_DEVELOPMENT]</div>
        <h2>APP 作品集</h2>
        <div class="app-screenshot">
            <img src="assets/images/app-v123.jpg" alt="App Preview" style="width:100%">
        </div>
        <p>這裡是關於報價系統的詳細技術文件...</p>
        <button class="btn" onclick="showPage('home')">返回主選單</button>
    </section>

    <section id="bots" class="page-content">
        <div class="header-status">[PATH: /BOT_INTEGRATION]</div>
        <h2>自動化機器人</h2>
        <p>目前開發中的 Line/Telegram Bots...</p>
    </section>
</main>

    <script>
    // 1. 打字機效果
    const text = "wittdigital // PRECISION_ENGINEERING";
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typewriter-title").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 100);
        }
    }

    // 2. 分頁切換功能
    function showPage(pageId) {
        // 隱藏所有頁面
        const pages = document.querySelectorAll('.page-content');
        pages.forEach(page => page.classList.remove('active'));

        // 顯示指定的頁面
        const targetPage = document.getElementById(pageId);
        if (targetPage) {
            targetPage.classList.add('active');
        }

        // 如果回首頁，重啟打字機（可選）
        if (pageId === 'home') {
            document.getElementById("typewriter-title").innerHTML = "";
            i = 0;
            typeWriter();
        }
    }

    // 3. 綁定側邊欄點擊事件
    document.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault(); // 防止原本的跳轉行為
            const targetId = this.getAttribute('href').substring(1);
            showPage(targetId);
        });
    });

    window.onload = typeWriter;
</script>
</body>
</html>
